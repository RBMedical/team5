<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mobile Check Up</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --teal: #3dabbf;
      --teal-light: #d4f0ed;
      --teal-mid: #5ecdc0;
      --teal-ring: #b2e8e3;
      --bg: #e8f7f6;
      --card-bg: #ffffff;
      --text-main: #2d4a47;
      --text-sub: #2d4a47;
      --border: #ceecea;
      --green-dot: #52c5c9;
    }

    html,
    body {
      height: 100%;
      width: 100%;
      background: var(--bg);
      font-family: 'Inter', 'Sarabun', sans-serif;
        height: 100%;
       overflow-y: scroll;
    }

    /* ── Outer shell — fills the whole viewport ── */
    .shell {
      background: var(--bg);
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    .hdr {
      background: var(--teal);
      padding: clamp(14px, 2.2vh, 22px) clamp(18px, 3vw, 32px);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .hdr-icon {
      background: rgba(255, 255, 255, 0.25);
      border-radius: 10px;
      width: clamp(38px, 5vh, 48px);
      height: clamp(38px, 5vh, 48px);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .hdr-icon svg {
      width: 55%;
      height: 55%;
    }

    .hdr-text h1 {
      color: #fff;
      font-size: clamp(16px, 2.4vh, 22px);
      font-weight: 700;
      line-height: 1.2;
    }

    .hdr-text p {
      color: rgba(255, 255, 255, .85);
      font-size: clamp(10px, 1.5vh, 13px);
      font-family: 'Sarabun', sans-serif;
      margin-top: 2px;
    }

    .hdr-ecg {
      margin-left: auto;
      opacity: .78;
      width: clamp(70px, 9vw, 110px);
      height: auto;
    }

    /* ── Section label ── */
    .sec-label {
      text-align: center;
      font-family: 'Sarabun', sans-serif;
      font-size: clamp(13px, 1.9vh, 17px);
      font-weight: 700;
      color: var(--text-main);
      padding: clamp(10px, 1.8vh, 18px) 0 clamp(6px, 1.2vh, 12px);
      flex-shrink: 0;
    }

    /* ── Grid — fills remaining height ── */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(10px, 1.6vw, 18px);
      padding: 0 clamp(14px, 2.4vw, 28px) clamp(4px, 0.8vh, 8px);
      flex: 1;
      min-height: 0;
    }

    /* ── Card — stretches to fill its grid cell ── */
    .card {
      background: var(--card-bg);
      border-radius: 16px;
      border: 1.5px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(6px, 1.2vh, 14px);
      text-decoration: none;
      position: relative;
      padding: clamp(10px, 1.5vh, 18px) 10px;
      transition: transform .15s, box-shadow .15s;
      min-height: 0;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(61, 191, 176, .2);
    }

    .card:active {
      transform: none;
    }

    .num {
      position: absolute;
      top: 10px;
      left: 14px;
      font-size: clamp(9px, 1.3vh, 12px);
      font-weight: 700;
      color: var(--teal);
      opacity: .7;
      letter-spacing: .04em;
    }

    .ico {
      width: clamp(58px, 9vh, 96px);
      height: clamp(58px, 9vh, 96px);
      border-radius: 50%;
      background: var(--teal-light);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .ico svg {
      width: 50%;
      height: 50%;
    }

    .name-th {
      font-family: 'Sarabun', sans-serif;
      font-size: clamp(13px, 1.9vh, 18px);
      font-weight: 700;
      color: var(--text-main);
      text-align: center;
      line-height: 1.3;
    }

    .name-en {
      font-size: clamp(10px, 1.4vh, 13px);
      font-weight: 500;
      color: var(--text-sub);
      text-align: center;
    }

    /* ── Footer bar ── */
    .ftr {
      margin: 0 clamp(14px, 2.4vw, 28px) clamp(14px, 2.2vh, 24px);
      background: var(--card-bg);
      border-radius: 14px;
      border: 1.5px solid var(--border);
      padding: clamp(10px, 1.6vh, 16px) clamp(14px, 2vw, 22px);
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      flex-shrink: 0;
      transition: box-shadow .15s;
    }

    .ftr:hover {
      box-shadow: 0 4px 14px rgba(61, 191, 176, .15);
    }

    .ftr-text strong {
      display: block;
      font-family: 'Sarabun', sans-serif;
      font-size: clamp(13px, 1.8vh, 16px);
      font-weight: 700;
      color: var(--text-main);
    }

    .ftr-text span {
      font-size: clamp(10px, 1.4vh, 12px);
      color: var(--teal);
    }

    .badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: clamp(11px, 1.6vh, 14px);
      font-weight: 600;
      color: var(--green-dot);
      margin-left: auto;
      white-space: nowrap;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green-dot);
    }

    /* ════════════════════════════════════
       LANDSCAPE — 3 columns × 2 rows
       ════════════════════════════════════ */
    @media (orientation: landscape) {
      .grid {
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(2, 1fr);
      }

      .ico {
        width: clamp(54px, 14vh, 110px);
        height: clamp(54px, 14vh, 110px);
      }

      .name-th {
        font-size: clamp(13px, 2.6vh, 20px);
      }

      .name-en {
        font-size: clamp(10px, 1.9vh, 14px);
      }

      .hdr-text h1 {
        font-size: clamp(16px, 3.2vh, 24px);
      }
    }
  </style>
</head>

<body>
  <div class="shell">

 <div class="sec-label">เลือกทีมออกหน่วย</div>

      <!-- 02 -->

      <!-- 03 -->

  </div>
</body>

</html>
